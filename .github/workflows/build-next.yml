name: Node.js CI

on:
  push:
    branches:
      - feat/react18

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    # runs-on: self-hosted
    env:
      NPM_TAG: next
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Install project dependencies
        run: |
          npm ci
      - name: Setup GIT
        run: |
          git config user.email "github@zengenti.com"
          git config user.name "$GITHUB_ACTOR"
      - name: Build package and increment version
        run: |
          npm run build
          npm version prerelease --preid=beta --no-git-tag-version
      - name: Push version increment to GIT
        run: |
          git add -A
          git commit -m "ci: bumps version [skip ci]"
          git push
        env:
          # The secret is passed automatically. Nothing to configure.
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish prerelease package
        run: npm publish --provenance --tag ${{ env.NPM_TAG }} --ignore-scripts
